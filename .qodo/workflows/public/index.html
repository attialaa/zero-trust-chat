<!DOCTYPE html>
<html>
<head>
<title>Zero Trust Chat</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0b1220;
  color: white;
  display: flex;
  height: 100vh;
}

#sidebar {
  width: 200px;
  background: #111827;
  padding: 10px;
}

#chat {
  flex: 1;
  display: flex;
  flex-direction: column;
}

#messages {
  flex: 1;
  padding: 10px;
  overflow-y: auto;
  display: flex;
  flex-direction: column;
}

.msg {
  padding: 8px;
  margin: 5px;
  border-radius: 8px;
  max-width: 60%;
}

.me {
  background: #2563eb;
  align-self: flex-end;
}

.other {
  background: #374151;
}

.system {
  text-align: center;
  color: #38bdf8;
  font-size: 12px;
}

.dm {
  background: #f59e0b;
  color: black;
}

#inputBox {
  display: flex;
  padding: 10px;
  background: #111827;
}

input {
  flex: 1;
  padding: 10px;
  border: none;
  outline: none;
}

button {
  padding: 10px;
  margin-left: 5px;
  cursor: pointer;
}
</style>

</head>

<body>

<div id="sidebar">
<h3>Online</h3>
<div id="users"></div>
</div>

<div id="chat">

<div id="messages"></div>

<div id="inputBox">
  <input id="username" placeholder="username">
  <button onclick="login()">Login</button>
</div>

<div id="inputBox">
  <input id="message" placeholder="Type message or /dm user msg">
  <button onclick="send()">Send</button>
  <button onclick="logout()">Logout</button>
</div>

</div>

<script>
let socket;
let token;
let myName = "";

function login() {
  myName = document.getElementById("username").value;

  fetch(`https://zero-chat-server.onrender.com/login?username=${myName}`)
    .then(r => r.json())
    .then(data => {
      token = data.token;

      socket = new WebSocket("wss://zero-chat-server.onrender.com");

      socket.onmessage = (e) => {
        const data = JSON.parse(e.data);
        const div = document.createElement("div");

        if (data.type === "chat") {
          div.className = data.message.startsWith(myName) ? "msg me" : "msg other";
          div.textContent = `[${data.time}] ${data.message}`;
        }

        if (data.type === "system") {
          div.className = "system";
          div.textContent = `[${data.time}] ${data.message}`;
        }

        if (data.type === "dm") {
          div.className = "msg dm";
          div.textContent = `[${data.time}] ${data.message}`;
        }

        if (data.type === "users") {
          document.getElementById("users").innerHTML =
            data.users.map(u => `<div>${u}</div>`).join("");
          return;
        }

        if (data.type === "error") {
          alert(data.message);
          return;
        }

        document.getElementById("messages").appendChild(div);
      };
    });
}

function send() {
  const message = document.getElementById("message").value;

  socket.send(JSON.stringify({
    token,
    message
  }));

  document.getElementById("message").value = "";
}

function logout() {
  if (socket) socket.close();
  alert("Logged out");
}
</script>

</body>
</html>
